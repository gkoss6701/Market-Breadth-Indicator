name: Daily Ingest

on:
  schedule:
    - cron: "30 21 * * 1-5"  # ~4:30pm ET / 21:30 UTC, weekdays
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Run ingestion
        env:
          BREADTH_DB_PATH: data/breadth.db
        run: python -m scripts.daily_ingest
      - name: Commit updated DB
        run: |
          git config user.name "breadth-bot"
          git config user.email "breadth-bot@users.noreply.github.com"
          git add data/breadth.db
          git commit -m "Daily ingest $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
